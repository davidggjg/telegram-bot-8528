services:
  - type: web
    name: telegram-stream-server
    env: docker
    plan: free
    healthCheckPath: /ping
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: BOT_TOKEN
        sync: false
      # BASE_URL לא חובה — הקוד מגלה אותו אוטומטית מ-RENDER_EXTERNAL_URL.
      # הגדר אותו ידנית רק אם אתה רוצה דומיין מותאם אישית.
