services:
  - type: web
    name: telegram-stream-server
    env: docker
    plan: free
    healthCheckPath: /ping
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      # SESSION_STRING לא נדרש יותר! הבוט מזרים ישירות ב-MTProto בלי userbot.
      # BASE_URL לא חובה — הקוד מגלה אותו אוטומטית מ-RENDER_EXTERNAL_URL.
